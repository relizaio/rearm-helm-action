name: 'ReARM Version and Publish Helm Chart Action'
description: 'GitHub Action to version and publish helm chart to an OCI compliant registry and submit the release metadata to ReARM.'
branding:
  icon: 'anchor'
  color: 'green'
inputs:
  registry_username:
    description: "Username for chart repository"
    required: true
  registry_password:
    description: "Password for chart repository"
    required: true
  registry_host:
    description: "Host for chart repository"
    required: true
  helm_chart_name:
    description: "Name of the helm chart"
    required: true
  rearm_api_id:
    description: "ReARM API ID"
    required: true
  rearm_api_key:
    description: "ReARM API KEY"
    required: true
  rearm_api_url:
    description: "ReARM API URL"
    required: true
    default: 'https://demo.rearmhq.com'
  path:
    description: "Path to the relative to root of the repo (default is '.')"
    required: false
    default: "."
  ci_metadata:
    description: "Metadata for CI run, (Optional - default is GitHub)"
    required: false
    default: "GitHub"
  rearm_component_id:
    description: "Component UUID for this repository if org-wide key is used"
    required: false
  registry_type:
    description: "Type of registry, [OCI | ECR | CHARTMUSEUM - default is OCI]"
    required: false
    default: OCI
  aws_region:
    description: "AWS region, required when registry type is ECR"
    required: false
  enable_sbom:
    required: false
    default: 'false'
    description: Generates SBOM and stores it along with the artifact
  enable_public_cosign_sigstore:
    required: false
    default: 'false'
    description: "Sign SBOMs using public sigstore via cosign"
  successful_build_lifecycle:
    required: false
    default: 'ASSEMBLED'
    description: "Status on build success to be set on ReARM (DRAFT or ASSEMBLED)"
  enable_securesbom:
    required: false
    default: 'false'
    description: "Enable SecureSBOM by ShiftLeftCyber signing of SBOMs"
  securesbom_pub_key_id:
    required: false
    default: ''
    description: "Public key id to sign with SecureSBOM by ShiftLeftCyber"
  securesbom_host:
    required: false
    default: ''
    description: "SecureSBOM (by ShiftLeftCyber) host"
  securesbom_api_key:
    required: false
    default: ''
    description: "SecureSBOM (by ShiftLeftCyber) API key"
runs:
  using: "composite"
  steps:
    - name: Checkout
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      with:
        fetch-depth: 0
    - id: setup-rearm
      name: setup-rearm
      uses: relizaio/rearm-actions/setup-cli@f2950b85c870a96a55994a92bdecebe445916bd4 # v1.0.0
    - name: Display rearm version
      shell: bash
      run: rearm version
    - id: init
      name: Initialize ReARM Flow
      uses: relizaio/rearm-actions/initialize@f2950b85c870a96a55994a92bdecebe445916bd4 # v1.0.0
      with: 
        rearm_api_id: ${{ inputs.rearm_api_id }}
        rearm_api_key: ${{ inputs.rearm_api_key }}
        rearm_api_url: ${{inputs.rearm_api_url}}
        repo_path: ${{inputs.path}}
        component: ${{inputs.rearm_component_id}}
    - name: Instantiate Lifecycle as Rejected to handle possible build failure
      shell: bash
      run: |
        echo "REARM_BUILD_LIFECYCLE=REJECTED" >> $GITHUB_ENV
    - name: Build and push Helm Chart to Registry
      shell: bash
      if: ${{env.REARM_DO_BUILD == 'true'}}
      continue-on-error: true
      run: |
        # update version on the chart
        sed -i "/^version: /s/.*/version: ${{ steps.init.outputs.full_version }}/" ${{inputs.path}}/Chart.yaml
        
        # git commit and update
        git config --global user.name 'reliza-auto'
        git config --global user.email 'info@reliza.io'
        git add ${{inputs.path}}/Chart.yaml
        git commit -m "chore: bump helm chart version to ${{ steps.init.outputs.full_version }} [skip ci]"
        git push
        commit_sha=$(git log -1 --pretty='%H')
        
        if [ ! -z "${{ steps.init.outputs.last_commit }}" ]
        then
          commit_list=$(git log ${{ steps.init.outputs.last_commit }}..$commit_sha --date=iso-strict --pretty='%H|||%ad|||%s' ./ | base64 -w 0)
        else
          commit_list=$(git log -2 --date=iso-strict --pretty='%H|||%ad|||%s|||%an|||%ae' -- ./ | base64 -w 0)
        fi        
        echo "COMMIT_LIST=$commit_list " >> $GITHUB_ENV
        echo "SCE_COMMIT=$commit_sha" >> $GITHUB_ENV
        echo "SCE_COMMIT_MESSAGE=$(git log -1 --pretty='%s' $commit_sha)" >> $GITHUB_ENV
        echo "SCE_COMMIT_DATE=$(git log -1 --date=iso-strict --pretty='%ad' $commit_sha)" >> $GITHUB_ENV
    - name: Install helm
      if: ${{env.REARM_DO_BUILD == 'true'}}
      uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0
      with:
        version: '3.17.2'
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@b47578312673ae6fa5b5096b330d9fbac3d116df # v4.2.1
      if: ${{ inputs.registry_type == 'ECR'}}
      with:
        aws-access-key-id: ${{ inputs.registry_username }}
        aws-secret-access-key: ${{ inputs.registry_password }}
        aws-region: ${{inputs.aws_region}}
    - name: Publish Helm Chart
      if: ${{env.REARM_DO_BUILD == 'true'}}
      shell: bash
      run: |
        case ${{inputs.registry_type}} in

          OCI)
            helm registry login -u '${{ inputs.registry_username }}' -p '${{ inputs.registry_password }}' ${{inputs.registry_host}}
            helm package ${{inputs.path}}
            helm push $(pwd)/*.tgz oci://${{inputs.registry_host}}
            ;;

          ECR)
            aws ecr get-login-password \
              --region ${{inputs.aws_region}} | helm registry login \
              --username AWS \
              --password-stdin ${{inputs.registry_host}}
            helm package ${{inputs.path}}
            helm push $(pwd)/*.tgz oci://${{inputs.registry_host}}
            ;;

          CHARTMUSEUM)
            # publish helm chart on Chartmuseum registry
            docker run --rm -v $(pwd)/${{inputs.path}}:/apps/helm relizaio/helmpush cm-push /apps/helm ${{inputs.registry_host}} -u '${{ inputs.registry_username }}' -p '${{ inputs.registry_password }}'

            # download and compute sha256 digest for helm chart package tgz
            docker run --rm -v $(pwd):/apps/helm --entrypoint /bin/sh relizaio/helmpush -c "helm repo add repo ${{inputs.registry_host}} --username '${{ inputs.registry_username }}' --password '${{ inputs.registry_password }}' && helm pull repo/${{inputs.helm_chart_name}} --version ${{ steps.init.outputs.full_version }} -d /apps/helm/"
            ;;
        esac
              
        sha_digest=$(sha256sum $(pwd)/*.tgz | cut -f 1 -d ' ')
        echo "shadigest = $sha_digest"    
  
        echo "SHA_DIGEST=$sha_digest" >> $GITHUB_ENV
        echo "REARM_BUILD_LIFECYCLE=${{inputs.successful_build_lifecycle}}" >> $GITHUB_ENV
    - name: Login to other Docker Registry
      uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
      if: ${{inputs.enable_public_cosign_sigstore == 'true'}}
      with:
        registry: ${{inputs.registry_host}}
        username: ${{inputs.registry_username}}
        password: ${{inputs.registry_password}}
    - name: Generate and sign SBOMs
      if: steps.init.outputs.do_build == 'true'
      id: sbom
      uses: relizaio/rearm-actions/sbom-sign-scan@e54def91db36ff15e6fd1a7c15033ae8bf4eaad5 # v1.0.1
      with:
        image_full_name: ${{inputs.registry_host}}/${{inputs.helm_chart_name}}
        image_digest: "sha256:${{ env.SHA_DIGEST }}"
        rearm_short_version: ${{ steps.init.outputs.short_version }}
        rearm_full_version: ${{ steps.init.outputs.full_version }}
        enable_sbom: ${{inputs.enable_sbom}}
        source_code_sbom_type: helm
        registry_username: ${{inputs.registry_username}}
        registry_password: ${{inputs.registry_password}}
        registry_host: ${{inputs.registry_host}}
        repo_path: ${{inputs.path}}
        enable_public_cosign_sigstore: ${{inputs.enable_public_cosign_sigstore}}
        deliverable_type: FILE
    - name: Submit metadata to ReARM and Finalize
      if: steps.init.outputs.do_build == 'true'
      uses: relizaio/rearm-actions/finalize@f2950b85c870a96a55994a92bdecebe445916bd4 # v1.0.0
      with:
        rearm_api_id: ${{ inputs.rearm_api_id }}
        rearm_api_key: ${{ inputs.rearm_api_key }}
        rearm_api_url: ${{inputs.rearm_api_url}}
        image_full_name: ${{inputs.registry_host}}/${{inputs.helm_chart_name}}
        image_digest: "sha256:${{ env.SHA_DIGEST }}"
        rearm_build_start: ${{ steps.init.outputs.build_start }}
        rearm_short_version: ${{ steps.init.outputs.short_version }}
        rearm_full_version: ${{ steps.init.outputs.full_version }}
        rearm_build_lifecycle: ${{env.REARM_BUILD_LIFECYCLE}}
        commit_list: ${{ env.COMMIT_LIST }}
        sce_commit: ${{ env.SCE_COMMIT }}
        sce_commit_message: ${{ env.SCE_COMMIT_MESSAGE }}
        sce_commit_date: ${{ env.SCE_COMMIT_DATE }}
        sce_vcs_uri: ${{ steps.init.outputs.sce_vcs_uri }}
        scearts: ${{ steps.sbom.outputs.scearts }}
        purl: ${{ steps.sbom.outputs.purl }}
        repo_path: ${{inputs.path}}
        finalize_release: "true"
        component: ${{inputs.rearm_component_id}}
        deliverable_type: FILE
post:
  shell: bash
  run: |
    rm -rf /tmp/reliza/*
